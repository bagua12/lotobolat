<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LOTOBOLAT PRO - Sistema de Ventas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #f4f6f9; }
        .navbar { background: #1e3799 !important; }
        .stock-val { font-size: 1.6rem; font-weight: bold; color: #0d6efd; }
        .input-cantidad { width: 80px; text-align: center; border: 2px solid #ced4da; }
        .card { border-radius: 15px; border: none; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark p-3 mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <span class="navbar-brand fw-bold fs-3">🍀 LOTOBOLAT</span>
        <select id="filtroTienda" class="form-select w-auto fw-bold">
            <option value="" selected disabled>Seleccione Tienda</option>
            <option value="RED AT BRISAS">🏪 RED AT BRISAS</option>
            <option value="RED AT OREBRERO">🏪 RED AT OREBRERO</option>
        </select>
    </div>
</nav>

<div class="container">
    <div class="card p-4 shadow-sm">
        <div id="loading" class="text-center d-none py-4">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2">Buscando productos en la base de datos...</p>
        </div>
        <table class="table table-hover align-middle" id="tablaVentas">
            <thead class="table-light">
                <tr>
                    <th>Producto</th>
                    <th class="text-center">Stock</th>
                    <th class="text-center">Ventas Hoy</th>
                    <th class="text-end">Vender</th>
                </tr>
            </thead>
            <tbody id="tablaCuerpo">
                <tr><td colspan="4" class="text-center py-5 text-muted">Seleccione una tienda en la parte superior.</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // --- CONFIGURACIÓN (Pon tus datos aquí) ---
    const SB_URL = 'https://sycmikcciovhghzfgmrd.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5Y21pa2NjaW92aGdoemZnbXJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2OTk2OTcsImV4cCI6MjA5MjI3NTY5N30.QLWx_ACAqXcO9IWOfD4jCKDFPpZ0srkjIdXpQYFnY2M';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let tiendaSeleccionada = "";

    document.getElementById('filtroTienda').addEventListener('change', async function() {
        const tienda = this.value;
        const pass = prompt(`Clave para ${tienda}:`);
        
        if (pass === 'brisas2024' || pass === 'orebrero2024') {
            tiendaSeleccionada = tienda;
            await cargarInventario();
        } else {
            alert("Clave incorrecta");
            this.value = "";
        }
    });

    async function cargarInventario() {
        const tbody = document.getElementById('tablaCuerpo');
        const loader = document.getElementById('loading');
        
        tbody.innerHTML = '';
        loader.classList.remove('d-none');

        try {
            // Traer TODO de la tabla productos
            const { data: prods, error: pErr } = await supabaseClient
                .from('productos')
                .select('*');

            if (pErr) throw pErr;

            // Filtrar manualmente por tienda para evitar errores de mayúsculas o espacios
            const filtrados = prods.filter(p => p.tienda.trim() === tiendaSeleccionada.trim());

            if (filtrados.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center text-danger py-4">No se encontraron productos para "${tiendaSeleccionada}" en la base de datos.</td></tr>`;
            } else {
                // Traer ventas de hoy
                const hoy = new Date().toISOString().split('T')[0];
                const { data: vtas } = await supabaseClient.from('ventas_diarias').select('*').gte('fecha', hoy);

                filtrados.forEach(p => {
                    const cantVendida = vtas ? vtas.filter(v => v.producto_id === p.id).reduce((acc, v) => acc + (v.cantidad || 0), 0) : 0;
                    
                    tbody.innerHTML += `
                        <tr>
                            <td class="fw-bold fs-5">${p.nombre}</td>
                            <td class="text-center"><span class="stock-val">${p.stock_inicial}</span></td>
                            <td class="text-center text-muted fs-5">${cantVendida}</td>
                            <td class="text-end">
                                <div class="d-flex justify-content-end gap-2">
                                    <input type="number" id="cant_${p.id}" class="form-control input-cantidad" value="1" min="1">
                                    <button class="btn btn-danger fw-bold" onclick="ejecutarVenta('${p.id}', ${p.stock_inicial}, ${p.precio_venta})">VENDER</button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            }
        } catch (err) {
            alert("Error de conexión: " + err.message);
        } finally {
            loader.classList.add('d-none');
        }
    }

    async function ejecutarVenta(id, stockActual, precio) {
        const input = document.getElementById(`cant_${id}`);
        const cantidad = parseInt(input.value);

        if (isNaN(cantidad) || cantidad <= 0 || cantidad > stockActual) {
            return alert("Cantidad no válida o stock insuficiente");
        }

        const { error } = await supabaseClient.from('ventas_diarias').insert([
            { producto_id: id, cantidad: cantidad, monto_total: (precio * cantidad) }
        ]);

        if (!error) {
            await supabaseClient.from('productos').update({ stock_inicial: stockActual - cantidad }).eq('id', id);
            await cargarInventario();
        } else {
            alert("Error al registrar venta");
        }
    }
</script>
</body>
</html>
